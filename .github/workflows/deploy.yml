name: Deploy frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/art-crazy/kartochki-online-front:latest
  NEXT_PUBLIC_APP_URL: https://kartochki-online.ru
  NEXT_PUBLIC_API_URL: https://api.kartochki-online.ru
  INTERNAL_API_URL: http://backend:8080

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build check
        env:
          NEXT_PUBLIC_APP_URL: ${{ env.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_API_URL: ${{ env.NEXT_PUBLIC_API_URL }}
          INTERNAL_API_URL: ${{ env.INTERNAL_API_URL }}
          NEXT_PUBLIC_VK_ID_APP_ID: ${{ secrets.NEXT_PUBLIC_VK_ID_APP_ID }}
          NEXT_PUBLIC_YANDEX_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_YANDEX_CLIENT_ID }}
        run: npm run build

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ env.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_API_URL=${{ env.NEXT_PUBLIC_API_URL }}
            INTERNAL_API_URL=${{ env.INTERNAL_API_URL }}
            NEXT_PUBLIC_VK_ID_APP_ID=${{ secrets.NEXT_PUBLIC_VK_ID_APP_ID }}
            NEXT_PUBLIC_YANDEX_CLIENT_ID=${{ secrets.NEXT_PUBLIC_YANDEX_CLIENT_ID }}

      - name: Configure SSH
        env:
          SERVER_DEPLOY_SSH_KEY: ${{ secrets.SERVER_DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SERVER_DEPLOY_SSH_KEY" > ~/.ssh/server_key
          chmod 600 ~/.ssh/server_key
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Write frontend env
        env:
          NEXT_PUBLIC_VK_ID_APP_ID: ${{ secrets.NEXT_PUBLIC_VK_ID_APP_ID }}
          NEXT_PUBLIC_YANDEX_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_YANDEX_CLIENT_ID }}
        run: |
          {
            printf 'NEXT_PUBLIC_APP_URL=%s\n' "${{ env.NEXT_PUBLIC_APP_URL }}"
            printf 'NEXT_PUBLIC_API_URL=%s\n' "${{ env.NEXT_PUBLIC_API_URL }}"
            printf 'INTERNAL_API_URL=%s\n' "${{ env.INTERNAL_API_URL }}"
            printf 'NEXT_PUBLIC_VK_ID_APP_ID=%s\n' "$NEXT_PUBLIC_VK_ID_APP_ID"
            printf 'NEXT_PUBLIC_YANDEX_CLIENT_ID=%s\n' "$NEXT_PUBLIC_YANDEX_CLIENT_ID"
          } > frontend.env

          scp -i ~/.ssh/server_key frontend.env ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/kartochki-frontend.env
          ssh -i ~/.ssh/server_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} '
            set -e
            install -m 0600 /tmp/kartochki-frontend.env /opt/kartochki/frontend.env
            rm -f /tmp/kartochki-frontend.env
          '

      - name: Deploy frontend
        run: |
          ssh -i ~/.ssh/server_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} '
            cd /opt/kartochki
            ./deploy.sh frontend
          '
