<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7f4ed"/>
      <stop offset="100%" stop-color="#edeae2"/>
    </linearGradient>
  </defs>

  <!-- Фон -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!--
    Дизайн-система:
    - Холст 512×512, поля 72px → рабочая зона 368×368
    - Стойка: x=72..140 (68px wide), y=72..440
    - Толщина лучей = 68px (та же что стойка)
    - Точка схождения: правый край стойки x=140, вертикальный центр y=256
    - Верхний луч: от (140,256) к (440,72)
    - Нижний луч: от (140,256) к (440,440)

    Верхний луч — вектор (300, -184), длина=351.5
    единичная нормаль: (184,300)/351.5 → *34 → (17.8, 29.0)
    P1=(140+17.8, 256+29.0)=(158, 285)
    P2=(140-17.8, 256-29.0)=(122, 227)
    P3=(440-17.8, 72-29.0)=(422, 43)  → обрезаем до y=72: пересчитаем конец
    P4=(440+17.8, 72+29.0)=(458, 101) → обрезаем

    Проще: зафиксирую конечные точки луча так чтобы
    он оканчивался строго в углу рабочей зоны, и задам 4 точки полосы вручную
    с учётом угла.

    Угол верхнего луча: atan2(-184,300) = -31.5°
    Нормаль повёрнута на 90°: угол 58.5°
    sin(58.5°)=0.852, cos(58.5°)=0.523
    полунормаль * 34: (17.8, 29.0)

    Верхний луч (от центра стойки вверх-вправо):
      start-top:    (140, 256-29) = (140, 227)
      start-bottom: (140, 256+29) = (140, 285)
      end-top:      (440, 72)
      end-bottom:   (440, 72+58) = (440, 130)

    Нижний луч (симметрично вниз-вправо):
      start-top:    (140, 256-29) = (140, 227)
      start-bottom: (140, 256+29) = (140, 285)
      end-top:      (440, 440-58) = (440, 382)
      end-bottom:   (440, 440)
  -->

  <!-- Стойка -->
  <rect x="72" y="72" width="68" height="368" rx="16" fill="#0d0d0d"/>

  <!-- Верхний луч — чёрный -->
  <polygon points="140,227 140,285 440,130 440,72" fill="#0d0d0d"/>

  <!-- Нижний луч — акцентный оранжевый -->
  <polygon points="140,227 140,285 440,440 440,382" fill="#e8440a"/>
</svg>
