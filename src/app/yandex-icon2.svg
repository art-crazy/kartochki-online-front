<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f2eb"/>
      <stop offset="100%" stop-color="#efece4"/>
    </linearGradient>
  </defs>

  <!-- Фон -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Вертикальная стойка -->
  <rect x="120" y="108" width="56" height="296" rx="12" fill="#0d0d0d"/>

  <!-- Верхний луч: полоса от стойки вверх-вправо
       Левый край: (176, 232) — (176, 280)  — ширина 48px на стойке
       Правый край: (392, 108) — (392, 156) — ширина 48px на конце
  -->
  <polygon points="176,280  176,232  392,108  392,156" fill="#0d0d0d"/>

  <!-- Нижний луч: полоса от стойки вниз-вправо — акцент
       Левый край: (176, 232) — (176, 280)
       Правый край: (392, 356) — (392, 404)
  -->
  <polygon points="176,232  176,280  392,404  392,356" fill="#e8440a"/>
</svg>
